    description: >-
      Incentivio describes an API-first, composable data platform that unifies
      guest data across POS, loyalty, app, and marketplace channels, with
      reverse ETL to sync to existing CRM and ad platforms. Real-time loyalty
      and digital events plus structured POS data are processed for guest
      scoring and segmentation. Public API reference, base URL, and
      authentication details are not published; access is provided through
      partner and enterprise integration programs.
