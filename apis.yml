features:
  - name: Online Ordering
    description: >-
      Branded web and native iOS/Android mobile ordering with menu, modifier,
      upsell recommendations, and gift card support.
  - name: Loyalty
    description: >-
      Configurable points, punch, or tier loyalty programs unified with
      ordering, marketing, and guest analytics.
  - name: Marketing Automation
    description: >-
      Email and SMS marketing automation driven by unified guest data and
      AI-derived segments.
  - name: AI Guest Scoring
    description: >-
      Continuous per-guest scoring for lifetime value, churn risk, visit
      frequency, journey stage, propensity-to-purchase, and offer sensitivity.
  - name: Unified Guest Identity
    description: >-
      One persistent Guest ID resolved across POS, app, web, and loyalty
      channels for a single guest record.
  - name: Reverse ETL
    description: >-
      Syncs unified guest records and scores back to existing CRM and ad
      platforms to fit the brand's existing stack.
  - name: BigQuery-Native Data Warehouse
    description: >-
      BigQuery-native platform with a Star Schema data model and direct
      warehouse access, optimized for enterprise-scale performance.
  - name: Closed-Loop ROI Measurement
    description: >-
      Executive and operator dashboards that tie AI capability to same-store
      sales growth with closed-loop measurement.
useCases:
  - name: Multi-Unit Restaurant Brands
    description: >-
