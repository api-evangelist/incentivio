      loyalty, marketing, and analytics on a single platform.
  - name: Guest Lifetime Value Growth
    description: >-
      Identifying high-LTV and at-risk guests to target retention, frequency,
      and average-order-value campaigns.
  - name: POS and Channel Data Unification
    description: >-
      Unifying POS, loyalty, app, web, and marketplace data into a single guest
      record for analytics and personalization.
solutions:
  - name: Connect Core
    description: >-
      Unified data warehouse with executive dashboards and direct warehouse
      access.
  - name: Connect Intelligence
    description: >-
      Adds the full AI scoring suite (LTV, churn, propensity, offer
      sensitivity) and closed-loop measurement on top of Core.
  - name: Connect Enterprise
    description: >-
      Dedicated instance with custom data models, API SLAs, and white-glove
      implementation.
