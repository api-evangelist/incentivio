apis:
  - aid: incentivio:rest-api
    name: Incentivio Connect Platform API
    description: >-
      Incentivio describes an API-first, composable data platform that unifies
      guest data across POS, loyalty, app, web, and marketplace channels into a
      single persistent Guest ID, with reverse ETL to sync to existing CRM and
      ad platforms. Real-time streaming and structured batch ETL process
      loyalty and digital events alongside structured POS data for guest
      scoring and segmentation. The platform is BigQuery-native with a Star
      Schema data model. Public API reference, base URL, and authentication
      details are not published; access is provided through partner and
      enterprise integration programs, with API SLAs offered on the Connect
      Enterprise tier.
